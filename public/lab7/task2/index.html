<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная 7, задание 2. Ибрагимова А.Ф., ИТ2301</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Задание 2</h1>

    <form id="userForm" method="GET" action="/api/lab7/task2/makeInitials">
        <fieldset>
            <legend>ФИО</legend>
            <input type="text" id="lastname" name="lastname" placeholder="Фамилия" required>
            <input type="text" id="firstname" name="firstname" placeholder="Имя" required>
            <input type="text" id="surname" name="surname" placeholder="Отчество" required>
        </fieldset>

        <fieldset>
            <legend>Пол</legend>
            <label><input type="radio" name="gender" value="Мужской" required> Мужской</label>
            <label><input type="radio" name="gender" value="Женский"> Женский</label>
        </fieldset>

        <fieldset>
            <legend>Факультет</legend>
            <select id="faculty" name="faculty" required title="Выберите факультет">
                <option value="">Не выбран</option>
                <option value="ИТ">ИТ</option>
                <option value="Экономика">Экономика</option>
                <option value="Менеджмент">Менеджмент</option>
            </select>
        </fieldset>

        <fieldset>
            <legend>Участие в проекте</legend>
            <label><input type="checkbox" id="project" name="project"> Участвую</label>
            <input type="text" id="projectName" name="projectName" placeholder="Название проекта"
                style="display: none;">
        </fieldset>

        <div class="buttons">
            <button type="submit" id="saveBtn">Сохранить (GET)</button>
            <button type="button" id="projectStatusBtn">Проверить статус участия</button>
        </div>
    </form>

    <div id="result"></div>

    <script src="script.js" defer></script>
</body>

</html>
